version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: nutri-franjo-db
    environment:
      POSTGRES_USER: nutri
      POSTGRES_PASSWORD: nutri
      POSTGRES_DB: nutri_franjo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
